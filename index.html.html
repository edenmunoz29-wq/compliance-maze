<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compliance Maze Game</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; }
    #game { margin: 40px auto; max-width: 600px; padding: 20px; background: #fff; border-radius: 8px; }
    button { margin: 8px; padding: 10px 20px; border: none; border-radius: 5px; background: #0078d7; color: white; cursor: pointer; }
    button:hover { background: #005a9e; }
    h2 { color: #0078d7; }
  </style>
</head>
<body>
  <h1>Compliance Maze Challenge</h1>
  <div id="game"></div>

  <script>
    let lives = 3;
    let score = 0;
    let currentQuestion = 0;
    let timer;

    const maze = [
      { scenario: "You discover sensitive data stored in a shared drive.", options: ["Report immediately to compliance", "Ignore it", "Copy it for backup"], answer: 0 },
      { scenario: "A colleague asks for access to restricted files.", options: ["Grant access if they insist", "Check clearance before granting", "Share via personal email"], answer: 1 },
      { scenario: "During a meeting, someone suggests skipping documentation to save time.", options: ["Agree to save effort", "Insist on proper documentation", "Stay silent"], answer: 1 },
      { scenario: "You receive an external request for unpublished data.", options: ["Share after anonymizing", "Decline and refer to official channels", "Send a partial dataset"], answer: 1 },
      { scenario: "Audit reveals inconsistencies in your report.", options: ["Fix quietly", "Escalate and correct transparently", "Delete the report"], answer: 1 },
      { scenario: "A new compliance rule is issued.", options: ["Wait until someone explains", "Read and apply immediately", "Ignore until enforced"], answer: 1 },
      { scenario: "You’re asked to interpret a vague regulation.", options: ["Give your own opinion", "Refer to cleared guidance", "Ask peers informally"], answer: 1 },
      { scenario: "You notice duplicate entries in the compliance database.", options: ["Delete without checking", "Verify and clean systematically", "Leave them alone"], answer: 1 },
      { scenario: "A manager pressures you to bypass a control.", options: ["Comply to avoid conflict", "Refuse and escalate", "Do it secretly"], answer: 1 },
      { scenario: "You’re preparing a compliance report for executives.", options: ["Use approved templates", "Invent your own format", "Skip formatting"], answer: 0 },
      { scenario: "You find outdated policies in circulation.", options: ["Update immediately", "Ignore since they’re minor", "Wait for audit"], answer: 0 },
      { scenario: "Colleagues share passwords for convenience.", options: ["Allow it", "Report and enforce secure access", "Join them"], answer: 1 },
      { scenario: "You’re asked to present compliance results.", options: ["Use clear visuals and summaries", "Overload with raw data", "Skip context"], answer: 0 },
      { scenario: "A vendor requests confidential project details.", options: ["Share under NDA", "Decline and escalate", "Send partial info"], answer: 1 },
      { scenario: "You’re designing a new compliance workflow.", options: ["Align with regulations and usability", "Focus only on speed", "Ignore documentation"], answer: 0 }
    ];

    function startTimer() {
      let timeLeft = 20;
      document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          loseLife("⏰ Time ran out!");
        }
      }, 1000);
    }

    function showQuestion() {
      clearInterval(timer);
      if (currentQuestion >= maze.length) {
        document.getElementById("game").innerHTML = `<h2>🎉 You finished the maze! Final Score: ${score}</h2>`;
        return;
      }
      const q = maze[currentQuestion];
      document.getElementById("game").innerHTML = `
        <h3>${q.scenario}</h3>
        <div id="timer"></div>
        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${i})">${opt}</button>`).join("")}
        <p>Lives: ${lives} | Score: ${score}</p>
      `;
      startTimer();
    }

    function checkAnswer(choice) {
      clearInterval(timer);
      if (choice === maze[currentQuestion].answer) {
        score += 10;
        currentQuestion++;
        showQuestion();
      } else {
        loseLife("❌ Wrong answer!");
      }
    }

    function loseLife(message) {
      lives--;
      if (lives <= 0) {
        document.getElementById("game").innerHTML = `<h2>💀 Game Over! Final Score: ${score}</h2>`;
      } else {
        document.getElementById("game").innerHTML += `<p>${message} You lost a life. Lives left: ${lives}</p>`;
        // Bonus "Audit Check" question
        document.getElementById("game").innerHTML += `<button onclick="bonusQuestion()">Audit Check</button>`;
      }
    }

    function bonusQuestion() {
      document.getElementById("game").innerHTML = `
        <h3>Audit Check: Documentation is missing. What do you do?</h3>
        <button onclick="bonusAnswer(true)">Escalate transparently</button>
        <button onclick="bonusAnswer(false)">Ignore it</button>
      `;
    }

    function bonusAnswer(correct) {
      if (correct) {
        score += 5;
        currentQuestion++;
      }
      showQuestion();
    }

    window.onload = showQuestion;
  </script>
</body>
</html>
