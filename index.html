
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO25 Compliance Simulation</title>

  <style>
    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e8f0f7, #fdfefe);
      color: #2c3e50;
      text-align: center;
      padding: 20px;
      font-size: 17px;
    }

    .game-container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 8px;
      font-weight: 700;
      color: #1f3a5f;
    }

    .role-desc {
      background: #eef6fb;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: #445;
      margin-bottom: 25px;
    }

    .scenario {
      font-size: 22px;
      font-weight: 600;
      margin: 25px 0;
      color: #243447;
    }

    .options button {
      display: block;
      margin: 12px auto;
      padding: 16px 20px;
      width: 92%;
      border: none;
      border-radius: 12px;
      background: #4ea1d3;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s;
    }

    .options button:hover {
      background: #3b8fc4;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .feedback {
      margin: 18px 0;
      font-weight: 600;
      font-size: 16px;
    }

    .timer {
      font-size: 16px;
      color: #e67e22;
      margin: 10px 0;
    }

    .progress-container {
      width: 100%;
      background: #e6ecf1;
      border-radius: 20px;
      margin: 18px 0;
      height: 18px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5ecf9d, #3fa9f5);
      transition: width 0.4s ease;
    }

    .status-line {
      font-size: 15px;
      color: #34495e;
      margin-bottom: 10px;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(5, minmax(42px, 11vw));
      grid-gap: 6px;
      justify-content: center;
      margin: 22px auto;
    }

    .cell {
      width: 11vw;
      max-width: 46px;
      height: 11vw;
      max-height: 46px;
      background: #dfe7ec;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .cell.start { background: #4ea1d3; }
    .cell.active { background: #5ecf9d; }
    .cell.exit { background: #f5b041; }

    .review {
      text-align: left;
      background: #f7fbfe;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.4;
    }

    .review p {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
<div class="game-container">
  <h1>🛡️ AO25 Compliance Simulation</h1>

  <div class="role-desc">
    <strong>Your Role:</strong> AO25 Information Custodian<br>
    <strong>Your Goal:</strong> Make safe, approved decisions as information moves through the system.
  </div>

  <p>Enter your name to begin:</p>
  <input type="text" id="playerName" placeholder="Your Name">
  <br><br>
  <button onclick="startSimulation()" style="padding:14px 26px;border-radius:14px;background:#5ecf9d;border:none;color:#fff;font-size:16px;cursor:pointer;">
    Start Simulation
  </button>

  <div id="game"></div>
  <div class="timer" id="timer"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-line" id="statusLine"></div>
  <div class="feedback" id="feedback"></div>
  <div class="maze" id="maze"></div>
  <div class="score" id="score"></div>
</div>

<script>
/* ---------- SIMULATION LOGIC (UNCHANGED CORE) ---------- */

const maze = [ /* same scenarios and explanations as before */ 
  {
    scenario: "A staff member updates the AO25 dashboard using data from an email that has not yet been formally cleared.",
    options: [
      "Update immediately since the data is available",
      "Wait for cleared and approved inputs before updating",
      "Upload the data but label it as unofficial"
    ],
    answer: 1,
    explanation: "Only cleared and approved data may be used for official AO25 dashboard updates."
  },
  {
    scenario: "The Data Systems team notices that an agency’s eligibility appears incorrect and decides to revise it in the system.",
    options: [
      "Correct it to ensure accuracy",
      "Decline, as the function does not determine or modify eligibility outcomes",
      "Correct it if the change is minor"
    ],
    answer: 1,
    explanation: "The function manages systems but does not determine or change eligibility outcomes."
  },
  {
    scenario: "A new scorecard template is created by a staff member without consulting approved guidelines.",
    options: [
      "Allow flexibility in templates",
      "Require alignment with approved guidelines",
      "Approve if the team agrees"
    ],
    answer: 1,
    explanation: "Templates must align with approved standards to ensure consistency."
  },
  {
    scenario: "An agency scorecard is uploaded before it has received formal clearance.",
    options: [
      "Upload immediately",
      "Upload only after clearance and authorization",
      "Upload temporarily and replace later"
    ],
    answer: 1,
    explanation: "Formal clearance is required prior to uploading official scorecards."
  },
  {
    scenario: "Compliance status is encoded based on verbal confirmation from a stakeholder.",
    options: [
      "Encode immediately",
      "Encode only after cleared outputs are received",
      "Encode but mark as provisional"
    ],
    answer: 1,
    explanation: "Verbal confirmation is not sufficient for encoding official data."
  },
  {
    scenario: "A request is made for unrestricted access to the AO25 database.",
    options: [
      "Grant full access",
      "Provide temporary access",
      "Apply appropriate access controls"
    ],
    answer: 2,
    explanation: "Access must be limited to authorized users."
  },
  {
    scenario: "The team modifies official data based on stakeholder interpretation.",
    options: [
      "Accept interpretation",
      "Reject and reflect only approved inputs",
      "Accept if documented"
    ],
    answer: 1,
    explanation: "Only approved inputs may be reflected."
  },
  {
    scenario: "Why is version control critical in managing compliance data?",
    options: [
      "To track changes and ensure integrity",
      "To reduce access",
      "To simplify reviews"
    ],
    answer: 0,
    explanation: "Version control ensures traceability and integrity."
  },
  {
    scenario: "Managing the AO25 dashboard primarily involves:",
    options: [
      "Determining eligibility",
      "Updating based on approved and cleared data",
      "Interpreting compliance rules"
    ],
    answer: 1,
    explanation: "Dashboard management reflects approved data."
  },
  {
    scenario: "Which best describes the function’s mandate?",
    options: [
      "Determines compliance outcomes",
      "Manages systems using validated data",
      "Provides policy interpretation"
    ],
    answer: 1,
    explanation: "The function manages systems, not decisions."
  }
];

let current = 0, score = 0, timer, timeTaken = 0, reviewLog = [];
const statusLine = document.getElementById("statusLine");

function getRoleStatus() {
  if (current < 3) return "Trainee";
  if (current < 6) return "Compliance Officer";
  if (current < 9) return "Information Custodian";
  return "Governance Champion";
}

function startSimulation() {
  current = score = timeTaken = 0;
  reviewLog = [];
  buildMaze();
  loadNode();
}

function buildMaze() {
  const grid = document.getElementById("maze");
  grid.innerHTML = "";
  maze.forEach((_, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    if (i === 0) cell.classList.add("start");
    if (i === maze.length - 1) cell.classList.add("exit");
    grid.appendChild(cell);
  });
}

function loadNode() {
  clearInterval(timer);
  if (current >= maze.length) return endSimulation();

  const q = maze[current];
  document.getElementById("game").innerHTML = `
    <div class="scenario">${q.scenario}</div>
    <div class="options">
      ${q.options.map((o, i) =>
        `<button onclick="checkPath(${i})">Proceed with: ${o}</button>`
      ).join("")}
    </div>
  `;

  startTimer();
  updateProgress();
}

function startTimer() {
  let t = 10;
  const timerEl = document.getElementById("timer");
  timerEl.textContent = `⏳ Clearance window: ${t}s`;
  timer = setInterval(() => {
    t--; timeTaken++;
    timerEl.textContent = `⏳ Clearance window: ${t}s`;
    if (t <= 0) {
      clearInterval(timer);
      document.getElementById("feedback").textContent =
        "⚠️ Clearance window closed. System reset.";
      current = score = 0;
      buildMaze();
      setTimeout(loadNode, 1400);
    }
  }, 1000);
}

function checkPath(choice) {
  clearInterval(timer);
  const q = maze[current];
  reviewLog.push({ ...q, chosen: q.options[choice] });

  if (choice === q.answer) {
    document.getElementById("feedback").textContent =
      "✅ Input accepted. Workflow continues.";
    document.querySelectorAll(".cell")[current].classList.add("active");
    score++; current++;
  } else {
    document.getElementById("feedback").textContent =
      "🚫 Policy mismatch detected. Workflow restarted.";
    current = score = 0;
    buildMaze();
  }
  setTimeout(loadNode, 1200);
}

function updateProgress() {
  document.getElementById("progressBar").style.width =
    `${(current / maze.length) * 100}%`;
  statusLine.textContent = `Current Status: ${getRoleStatus()}`;
}

function endSimulation() {
  let html = `<h2>✅ Simulation Complete</h2>
    <p><strong>Final Role:</strong> ${getRoleStatus()}</p>
    <div class="review">`;

  reviewLog.forEach((r, i) => {
    html += `<p><strong>Scenario ${i + 1}:</strong> ${r.scenario}<br>
      <strong>Your action:</strong> ${r.chosen}<br>
      <em>${r.explanation}</em></p>`;
  });
  html += "</div>";
  document.getElementById("game").innerHTML = html;
}
</script>
</body>
</html>
