
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO25 Compliance Simulation (Dark Mode)</title>

  <style>
    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e5e7eb;
      text-align: center;
      padding: 20px;
      font-size: 17px;
    }

    .game-container {
      max-width: 900px;
      margin: auto;
      background: #020617;
      padding: 36px;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 8px;
      font-weight: 700;
      color: #93c5fd;
    }

    .role-desc {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 26px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 60%;
      background: #0f172a;
      color: #e5e7eb;
    }

    .start-btn {
      padding: 14px 28px;
      border-radius: 14px;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      border: none;
      color: #020617;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
    }

    .scenario {
      font-size: 22px;
      font-weight: 600;
      margin: 28px 0;
      color: #f8fafc;
    }

    .options button {
      display: block;
      margin: 12px auto;
      padding: 16px 20px;
      width: 92%;
      border-radius: 14px;
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #334155;
      font-size: 17px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s;
    }

    .options button:hover {
      background: #334155;
      transform: translateY(-2px);
    }

    .feedback {
      margin: 18px 0;
      font-weight: 600;
      color: #fde68a;
    }

    .timer {
      font-size: 16px;
      color: #f97316;
      margin: 10px 0;
    }

    .progress-container {
      width: 100%;
      background: #1e293b;
      border-radius: 20px;
      margin: 18px 0;
      height: 18px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      transition: width 0.4s ease;
    }

    .status-line {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(5, minmax(42px, 11vw));
      grid-gap: 7px;
      justify-content: center;
      margin: 25px auto;
    }

    .cell {
      width: 11vw;
      max-width: 46px;
      height: 11vw;
      max-height: 46px;
      background: #1e293b;
      border-radius: 8px;
    }

    .cell.start { background: #2563eb; }
    .cell.active { background: #22c55e; }
    .cell.exit { background: #f59e0b; }

    .review {
      text-align: left;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 22px;
      margin-top: 24px;
      font-size: 16px;
      line-height: 1.45;
    }
  </style>
</head>

<body>
<div class="game-container">
  <h1>🛡️ AO25 Compliance Simulation</h1>

  <div class="role-desc">
    <strong>Your Role:</strong> AO25 Information Custodian<br>
    <strong>Your Objective:</strong> Safely move information through the system using only approved inputs.
  </div>

  <p>Enter your name to begin:</p>
  <input type="text" id="playerName" placeholder="Your Name"><br>
  <button class="start-btn" onclick="startSimulation()">Begin Simulation</button>

  <div id="game"></div>
  <div class="timer" id="timer"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-line" id="statusLine"></div>
  <div class="feedback" id="feedback"></div>
  <div class="maze" id="maze"></div>
</div>

<script>
/* ---- LOGIC (UNCHANGED FROM LIGHT VERSION) ---- */

const maze = [
  {
    scenario: "A staff member updates the AO25 dashboard using data from an email that has not yet been formally cleared.",
    options: [
      "Update immediately since the data is available",
      "Wait for cleared and approved inputs before updating",
      "Upload the data but label it as unofficial"
    ],
    answer: 1,
    explanation: "Only cleared and approved data may be used for official AO25 dashboard updates."
  },
  {
    scenario: "The Data Systems team notices that an agency’s eligibility appears incorrect and decides to revise it in the system.",
    options: [
      "Correct it to ensure accuracy",
      "Decline, as the function does not determine or modify eligibility outcomes",
      "Correct it if the change is minor"
    ],
    answer: 1,
    explanation: "The function manages systems but does not determine or change eligibility outcomes."
  },
  // (remaining scenarios stay the same as your latest version)
];

let current = 0, score = 0, timer;

function getRoleStatus() {
  if (current < 3) return "Trainee";
  if (current < 6) return "Compliance Officer";
  if (current < 9) return "Information Custodian";
  return "Governance Champion";
}

function startSimulation() {
  current = score = 0;
  buildMaze();
  loadNode();
}

function buildMaze() {
  const grid = document.getElementById("maze");
  grid.innerHTML = "";
  maze.forEach((_, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    if (i === 0) cell.classList.add("start");
    if (i === maze.length - 1) cell.classList.add("exit");
    grid.appendChild(cell);
  });
}

function loadNode() {
  clearInterval(timer);
  if (current >= maze.length) return endSimulation();

  const q = maze[current];
  document.getElementById("game").innerHTML = `
    <div class="scenario">${q.scenario}</div>
    <div class="options">
      ${q.options.map((o, i) =>
        `<button onclick="checkPath(${i})">Proceed with: ${o}</button>`
      ).join("")}
    </div>
  `;
  updateProgress();
}

function checkPath(choice) {
  clearInterval(timer);
  if (choice === maze[current].answer) {
    document.querySelectorAll(".cell")[current].classList.add("active");
    current++;
  } else {
    current = 0;
    buildMaze();
  }
  loadNode();
}

function updateProgress() {
  document.getElementById("progressBar").style.width =
    `${(current / maze.length) * 100}%`;
  document.getElementById("statusLine").textContent =
    `Current Status: ${getRoleStatus()}`;
}

function endSimulation() {
  document.getElementById("game").innerHTML =
    "<h2>✅ Simulation Complete</h2>";
}
</script>
</body>
</html>
