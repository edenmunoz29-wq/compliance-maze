input {

.start-btn {

  border: none;
  color: #020617;
  font-weight: 600;
  cursor: pointer;
  margin-top: 15px;
}

.scenario {
  font-size: 22px;
  font-weight: 600;
  margin: 28px 0;
}

.options button {
  display: block;
  margin: 12px auto;
  padding: 16px 20px;
  width: 92%;
  border-radius: 14px;
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
  font-size: 17px;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.options button:hover {
  transform: translateY(-2px);
  background: #334155;
}

.feedback {
  margin: 18px 0;
  font-weight: 600;
  color: #fde68a;
}

.timer {
  color: #f97316;
  margin: 10px 0;
}

.progress-container {
  width: 100%;
  background: #1e293b;
  border-radius: 20px;
  margin: 18px 0;
  height: 18px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #14b8a6);
  transition: width 0.5s ease;
}

.status-line {
  font-size: 15px;
  color: #cbd5e1;
}

.maze {
  display: grid;
  grid-template-columns: repeat(5, 46px);
  gap: 7px;
  justify-content: center;
  margin: 26px auto;
}

.cell {
  width: 46px;
  height: 46px;
  background: #1e293b;
  border-radius: 8px;
}

.cell.start { background: #2563eb; }
.cell.active { background: #22c55e; }
.cell.exit { background: #f59e0b; }
</style>
</head>
