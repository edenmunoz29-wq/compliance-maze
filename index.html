<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AO25 Compliance Simulation</title>
</head>
<body>
<h1>AO25 Compliance Simulation</h1>
<p>Enter your name:</p>
<input id="playerName">
<button onclick="startGame()">Begin Simulation</button>
<div id="welcome"></div>
<div id="game"></div>
<div id="role"></div>

<script>
const maze = [
  { scenario:"Dataset arrives without clearance.", options:["Encode","Wait","Share"], answer:1 },
  { scenario:"Multiple versions exist.", options:["Allow","Enforce","Delete"], answer:1 }
];

let current=0, score=0, playerName="";

function getRoleStatus(){
  if(current<1) return "Trainee";
  if(current<2) return "Compliance Officer";
  return "Champion";
}

function startGame(){
  playerName=document.getElementById("playerName").value.trim();
  if(!playerName){ alert("Enter your name first."); return; }
  document.getElementById("welcome").innerText=`Welcome, ${playerName}!`;
  current=0; score=0;
  loadNode();
}

function loadNode(){
  if(current>=maze.length){ endGame(); return; }
  const q=maze[current];
  document.getElementById("game").innerHTML=
    `<p>${q.scenario}</p>`+
    q.options.map((o,i)=>`<button onclick="checkPath(${i})">${o}</button>`).join("");
  document.getElementById("role").innerText="Role: "+getRoleStatus();
}

function checkPath(choice){
  if(choice===maze[current].answer){ score++; }
  current++;
  loadNode();
}

function endGame(){
  document.getElementById("game").innerHTML=
    `<h2>Done!</h2><p>${playerName}, final score: ${score}/${maze.length}</p>`;
}
</script>
</body>
</html>
