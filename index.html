
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO25 Simulation – Test Version</title>
<style>
body { font-family: Arial, sans-serif; background: #111827; color: #e5e7eb; text-align: center; }
button { padding: 12px; margin: 8px; }
</style>
</head>

<body>

<h1>AO25 Compliance Simulation (TEST)</h1>
<button onclick="startGame()">Start</button>

<div id="question"></div>
<div id="timer"></div>
<div id="status"></div>

<script>
const scenarios = [
  { q: "Use uncleared data?", a: ["Yes", "No"], c: 1 },
  { q: "Modify eligibility?", a: ["Yes", "No"], c: 1 },
  { q: "Create template freely?", a: ["Yes", "No"], c: 1 },
  { q: "Upload without clearance?", a: ["Yes", "No"], c: 1 },
  { q: "Encode verbal approval?", a: ["Yes", "No"], c: 1 },
  { q: "Grant full DB access?", a: ["Yes", "No"], c: 1 },
  { q: "Modify based on opinion?", a: ["Yes", "No"], c: 1 },
  { q: "Version control useful?", a: ["Yes", "No"], c: 0 },
  { q: "Decide eligibility?", a: ["Yes", "No"], c: 1 },
  { q: "Interpret policy?", a: ["Yes", "No"], c: 1 }
];

let index = 0;
let score = 0;
let timeTotal = 0;
let timer;

function startGame() {
  index = 0;
  score = 0;
  timeTotal = 0;
  showQuestion();
}

function showQuestion() {
  if (index >= scenarios.length) {
    document.getElementById("question").innerHTML =
      `<h2>Completed</h2>
       <p>Score: ${score}/10</p>
       <p>Total Time: ${timeTotal}s</p>`;
    return;
  }

  let s = scenarios[index];
  document.getElementById("question").innerHTML =
    `<h3>${s.q}</h3>
     ${s.a.map((x,i)=>`<button onclick="answer(${i})">${x}</button>`).join("")}`;

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  let t = 10;
  document.getElementById("timer").innerText = "Time: " + t;

  timer = setInterval(() => {
    t--;
    timeTotal++;
    document.getElementById("timer").innerText = "Time: " + t;
    if (t <= 0) {
      clearInterval(timer);
      index = 0;
      showQuestion();
    }
  }, 1000);
}

function answer(choice) {
  clearInterval(timer);
  if (choice === scenarios[index].c) score++;
  index++;
  showQuestion();
}
</script>

</body>
</html>
