<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AO25 Compliance Simulation</title>
<style>
body { font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; text-align:center; padding:20px; }
.game-container { max-width:800px; margin:auto; background:#020617; padding:30px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.6); }
h1 { color:#93c5fd; }
input { padding:10px; border-radius:8px; border:none; width:60%; background:#1e293b; color:#e5e7eb; }
button { padding:12px 24px; margin-top:10px; border:none; border-radius:10px; background:#22c55e; color:#020617; font-weight:bold; cursor:pointer; }
.scenario { font-size:20px; font-weight:bold; margin:20px 0; }
.options button { display:block; margin:8px auto; width:90%; background:#1e293b; color:#e5e7eb; border:1px solid #334155; }
.options button:hover { background:#334155; }
.feedback { margin:12px 0; font-weight:bold; color:#fde68a; }
.timer { color:#f97316; margin:10px 0; }
.progress-container { width:100%; background:#1e293b; border-radius:10px; margin:15px 0; height:16px; }
.progress-bar { height:100%; width:0%; background:#22c55e; transition:width 0.5s; }
.status-line { font-size:14px; color:#cbd5e1; }
.maze { display:grid; grid-template-columns:repeat(5,40px); gap:6px; justify-content:center; margin:20px auto; }
.cell { width:40px; height:40px; background:#1e293b; border-radius:6px; }
.cell.start { background:#2563eb; }
.cell.active { background:#22c55e; }
.cell.exit { background:#f59e0b; }
.score { margin-top:20px; font-size:16px; white-space:pre-line; }
</style>
</head>
<body>
<div class="game-container">
  <h1>🛡️ AO25 Compliance Simulation</h1>
  <p>Enter your name:</p>
  <input id="playerName" placeholder="Your Name">
  <button onclick="startGame()">Begin Simulation</button>
  <div id="welcome"></div>
  <div id="game"></div>
  <div class="timer" id="timer"></div>
  <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-line" id="statusLine"></div>
  <div class="feedback" id="feedback"></div>
  <div class="maze" id="maze"></div>
  <div class="score" id="score"></div>
</div>

<script>
const maze = [
  { scenario:"A staff member updates the AO25 dashboard using uncleared email data.", options:["Update immediately","Wait for approved inputs","Upload as unofficial"], answer:1 },
  { scenario:"Eligibility appears incorrect in the system.", options:["Correct it","Do not modify eligibility outcomes","Fix minor error"], answer:1 },
  { scenario:"A new scorecard template is created informally.", options:["Allow it","Align with approved guidelines","Approve by consensus"], answer:1 },
  { scenario:"An agency scorecard lacks clearance.", options:["Upload now","Upload after clearance","Upload temporarily"], answer:1 },
  { scenario:"Compliance status is based on verbal confirmation.", options:["Encode immediately","Wait for cleared outputs","Encode and flag"], answer:1 },
  { scenario:"A request is made for unrestricted DB access.", options:["Grant access","Temporary access","Apply access controls"], answer:2 },
  { scenario:"Data modified based on interpretation.", options:["Accept","Reflect approved inputs only","Accept if documented"], answer:1 },
  { scenario:"Why is version control important?", options:["Tracking & integrity","Limit access","Simplify design"], answer:0 },
  { scenario:"Dashboard management includes:", options:["Determining eligibility","Updating approved data","Interpret rules"], answer:1 },
  { scenario:"Function role is to:", options:["Determine outcomes","Manage systems with validated data","Interpret policy"], answer:1 }
];

let current=0, score=0, timer, timeTaken=0, playerName="";

function getRoleStatus(){
  if(current<3) return "Trainee";
  if(current<6) return "Compliance Officer";
  if(current<9) return "Information Custodian";
  return "Governance Champion";
}

function startGame(){
  playerName=document.getElementById("playerName").value.trim()||"Anonymous";
  document.getElementById("welcome").innerHTML=`👋 Welcome, <strong>${playerName}</strong>!`;
  current=0; score=0; timeTaken=0;
  buildMaze(); loadNode(); updateProgress();
}

function buildMaze(){
  const grid=document.getElementById("maze"); grid.innerHTML="";
  maze.forEach((_,i)=>{ const cell=document.createElement("div"); cell.className="cell";
    if(i===0) cell.classList.add("start"); if(i===maze.length-1) cell.classList.add("exit");
    grid.appendChild(cell); });
}

function loadNode(){
  clearInterval(timer);
  if(current<maze.length){
    const q=maze[current];
    document.getElementById("game").innerHTML=
      `<div class="scenario">${q.scenario}</div>
       <div class="options">${q.options.map((o,i)=>`<button onclick="checkPath(${i})">${o}</button>`).join("")}</div>`;
    document.getElementById("statusLine").innerText=`Current Role: ${getRoleStatus()}`;
    startTimer(); updateProgress();
  } else endMaze();
}

function startTimer(){
  let timeLeft=10; document.getElementById("timer").innerText=`⏱ ${timeLeft}s`;
  timer=setInterval(()=>{ timeLeft--; timeTaken++;
    document.getElementById("timer").innerText=`⏱ ${timeLeft}s`;
    if(timeLeft<=0){ clearInterval(timer);
      document.getElementById("feedback").innerText="⏳ Time's up! Reset.";
      current=0; score=0; buildMaze(); updateProgress();
      setTimeout(()=>{ document.getElementById("feedback").innerText=""; loadNode(); },1500);
    }
  },1000);
}

function checkPath(choice){
  clearInterval(timer);
  if(choice===maze[current].answer){
    document.getElementById("feedback").innerText="✅ Correct!";
    score++; document.getElementsByClassName("cell")[current].classList.add("active"); current++;
  } else {
    document.getElementById("feedback").innerText="❌ Wrong! Reset.";
    current=0; score=0; buildMaze();
  }
  updateProgress();
  setTimeout(()=>{ document.getElementById("feedback").innerText=""; loadNode(); },1200);
}

function updateProgress(){
  document.getElementById("progressBar").style.width=(current/maze.length)*100+"%";
}

function endMaze(){
  clearInterval(timer);
  document.getElementById("game").innerHTML="<h2>🎉 Simulation Complete</h2>";
  document.getElementById("score").innerText=
    `Player: ${playerName}\nFinal Role: ${getRoleStatus()}\nScore: ${score}/${maze.length}\nTime Taken: ${timeTaken} seconds`;
  document.getElementById("progressBar").style.width="100%";
}
</script>
</body>
</html>
