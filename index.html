<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Escape the Compliance Maze</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f0f0 url('https://www.transparenttextures.com/patterns/maze-black.png');
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game {
      width: 90%;
      height: 90%;
      padding: 40px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      text-align: center;
      overflow-y: auto;
    }
    h1 { font-size: 2.5em; margin-bottom: 10px; color: #0078d7; }
    h3 { font-size: 1.8em; margin-bottom: 15px; }
    p { font-size: 1.2em; }
    button {
      margin: 15px; padding: 16px 32px;
      border: none; border-radius: 10px;
      background: #0078d7; color: white;
      font-size: 18px; cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #005a9e; transform: scale(1.05); }
    .correct { color: green; font-weight: bold; font-size: 1.2em; }
    .wrong { color: red; font-weight: bold; font-size: 1.2em; }
    #timer { font-size: 1.5em; margin: 10px 0; color: #d9534f; }
    .progress { margin-top: 20px; }
    .step {
      display: inline-block; width: 30px; height: 30px;
      margin: 5px; border-radius: 5px; background: #ccc;
    }
    .step.correct { background: #4CAF50; }
    .step.wrong { background: #f0ad4e; }
    .step.active { background: #0078d7; }
  </style>
</head>
<body>
  <div id="game"></div>

  <script>
    let lives, score, currentQuestion, timer, participantName, startTime;

    const maze = [
      { scenario: "A dataset arrives without clearance.", options: ["Encode immediately", "Wait until cleared outputs", "Share informally"], answer: 1, explanation: "Always wait until clearance is given before processing datasets." },
      { scenario: "You discover sensitive data stored in a shared drive.", options: ["Report immediately to compliance", "Ignore it", "Copy it for backup"], answer: 0, explanation: "Sensitive data must be reported immediately to compliance to prevent unauthorized access." },
      { scenario: "Audit reveals inconsistencies in your report.", options: ["Fix quietly", "Escalate and correct transparently", "Delete the report"], answer: 1, explanation: "Transparency is key in audits — escalate and correct openly." },
      { scenario: "A manager pressures you to bypass a control.", options: ["Comply to avoid conflict", "Refuse and escalate", "Do it secretly"], answer: 1, explanation: "Controls must never be bypassed — escalate if pressured." },
      { scenario: "You’re preparing a compliance report for executives.", options: ["Use approved templates", "Invent your own format", "Skip formatting"], answer: 0, explanation: "Approved templates ensure consistency and clarity." },
      { scenario: "Colleagues share passwords for convenience.", options: ["Allow it", "Report and enforce secure access", "Join them"], answer: 1, explanation: "Passwords must never be shared — enforce secure access protocols." },
      { scenario: "You notice duplicate entries in the compliance database.", options: ["Delete without checking", "Verify and clean systematically", "Leave them alone"], answer: 1, explanation: "Systematic verification ensures data integrity." },
      { scenario: "A new compliance rule is issued.", options: ["Wait until someone explains", "Read and apply immediately", "Ignore until enforced"], answer: 1, explanation: "Compliance rules must be applied immediately to avoid violations." },
      { scenario: "You’re asked to interpret a vague regulation.", options: ["Give your own opinion", "Refer to cleared guidance", "Ask peers informally"], answer: 1, explanation: "Always rely on official guidance when interpreting regulations." },
      { scenario: "You receive an external request for unpublished data.", options: ["Share after anonymizing", "Decline and refer to official channels", "Send a partial dataset"], answer: 1, explanation: "External requests must go through official channels to protect confidentiality." }
    ];

    function askName() {
      document.getElementById("game").innerHTML = `
        <h1>🌀 Escape the Compliance Maze</h1>
        <p>Answer correctly to light up the path and reach the Exit!</p>
        <h3>Enter your name to begin:</h3>
        <input type="text" id="nameInput" placeholder="Your name" style="padding:10px; font-size:18px;">
        <br><br>
        <button onclick="startGame()">Start</button>
      `;
    }

    function startGame() {
      participantName = document.getElementById("nameInput").value || "Player";
      startTime = new Date();
      lives = 3; score = 0; currentQuestion = 0;
      showQuestion();
    }

    function startTimer() {
      let timeLeft = 10;
      document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          loseLife("⏰ Time ran out!");
        }
      }, 1000);
    }

    function showQuestion() {
      clearInterval(timer);
      if (currentQuestion >= maze.length || lives <= 0) { endGame(); return; }
      const q = maze[currentQuestion];
      document.getElementById("game").innerHTML = `
        <h1>🌀 Escape the Compliance Maze</h1>
        <p>Answer correctly to light up the path and reach the Exit!</p>
        <h3>Question ${currentQuestion + 1} of ${maze.length}</h3>
        <p>${q.scenario}</p>
        <div id="timer"></div>
        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${i})">${opt}</button>`).join("")}
        <p>Lives: ${lives} | Score: ${score}</p>
        <div class="progress">${renderProgress()}</div>
      `;
      startTimer();
    }

    function checkAnswer(choice) {
      clearInterval(timer);
      const q = maze[currentQuestion];
      if (choice === q.answer) {
        score += 10;
        document.getElementById("game").innerHTML += `
          <p class="correct">✅ Correct!</p>
          <p><em>${q.explanation}</em></p>
        `;
        updateProgress("correct");
        currentQuestion++;
        setTimeout(showQuestion, 2000);
      } else {
        updateProgress("wrong");
        loseLife("❌ Wrong answer!");
      }
    }

    function loseLife(message) {
      lives--;
      if (lives <= 0) { endGame(); }
      else {
        document.getElementById("game").innerHTML += `<p class="wrong">${message} You lost a life. Lives left: ${lives}</p>`;
      }
    }

    function renderProgress() {
      let html = "";
      for (let i = 0; i < maze.length; i++) {
        let cls = "step";
        if (i < currentQuestion) cls += " active";
        html += `<span class="${cls}" id="step${i}"></span>`;
      }
      return html;
    }

    function updateProgress(status) {
      const step = document.getElementById("step" + currentQuestion);
      if (step) step.className = "step " + status;
    }

    function endGame() {
      clearInterval(timer);
      const endTime = new Date();
      const totalTime = Math.floor((endTime - startTime) / 1000);
      document.getElementById("game").innerHTML = `
        <h1>🌀 Escape the Compliance Maze</h1>
        <h2>🎉 You reached the Compliance Exit!</h2>
        <div class="progress">${renderProgress()}</div>
        <p>Participant: <strong>${participantName}</strong></p>
