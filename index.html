
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO25 Compliance Simulation</title>

<style>
/* ---------- BASE ---------- */
body {
  margin: 0;
  padding: 20px;
  font-family: "Segoe UI", Inter, Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e5e7eb;
}

.app {
  max-width: 760px;
  margin: auto;
  background: #020617;
  border-radius: 16px;
  padding: 32px 36px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* ---------- HEADER ---------- */
.header h1 {
  margin: 0 0 6px 0;
  font-size: 28px;
  color: #93c5fd;
}

.header p {
  margin: 0;
  color: #cbd5f5;
  font-size: 14px;
}

/* ---------- PROGRESS BAR ---------- */
.progress-wrapper {
  margin: 18px 0 24px 0;
}

.progress-track {
  width: 100%;
  height: 12px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #14b8a6);
  transition: width 0.4s ease;
}

.progress-label {
  margin-top: 6px;
  font-size: 13px;
  color: #94a3b8;
}

/* ---------- CONTENT ---------- */
.content {
  margin-top: 20px;
}

.scenario {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
  line-height: 1.4;
}

/* ---------- BUTTONS ---------- */
button {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #e5e7eb;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}

button:hover {
  background: #334155;
  transform: translateY(-1px);
}

button.primary {
  margin-top: 16px;
  background: linear-gradient(90deg, #22c55e, #14b8a6);
  color: #020617;
  border: none;
  font-weight: 600;
}

button.primary:hover {
  background: linear-gradient(90deg, #16a34a, #0d9488);
}

/* ---------- STATUS ---------- */
.status {
  margin-top: 16px;
  font-size: 14px;
  color: #cbd5e1;
}

.timer {
  margin-top: 8px;
  color: #f97316;
  font-weight: 500;
}

/* ---------- FOOTER ---------- */
.footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #1e293b;
  font-size: 13px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>🛡️ AO25 Compliance Simulation</h1>
    <p><strong>Role:</strong> AO25 Information Custodian</p>
    <p>Objective: Make decisions using only cleared and approved inputs.</p>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-wrapper">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">
      Progress: 0%
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <button class="primary" onclick="startSimulation()">Start Simulation</button>
  </div>

  <!-- STATUS -->
  <div class="status" id="status"></div>
  <div class="timer" id="timer"></div>

  <!-- FOOTER -->
  <div class="footer">
    This activity simulates compliance-oriented decision making.
  </div>

</div>

<script>
/* ---------- DATA ---------- */
const scenarios = [
  { q: "Update the AO25 dashboard using uncleared email data?", a: ["Yes", "No"], c: 1 },
  { q: "Modify eligibility values in the system?", a: ["Yes", "No"], c: 1 },
  { q: "Create a new scorecard template without approval?", a: ["Yes", "No"], c: 1 },
  { q: "Upload an agency scorecard without clearance?", a: ["Yes", "No"], c: 1 },
  { q: "Encode compliance based on verbal confirmation?", a: ["Yes", "No"], c: 1 },
  { q: "Grant unrestricted database access?", a: ["Yes", "No"], c: 1 },
  { q: "Modify data based on interpretation?", a: ["Yes", "No"], c: 1 },
  { q: "Is version control important?", a: ["Yes", "No"], c: 0 },
  { q: "Does dashboard management determine eligibility?", a: ["Yes", "No"], c: 1 },
  { q: "Is policy interpretation part of this function?", a: ["Yes", "No"], c: 1 }
];

/* ---------- STATE ---------- */
let index = 0;
let score = 0;
let totalTime = 0;
let timer;

/* ---------- FUNCTIONS ---------- */
function startSimulation() {
  index = 0;
  score = 0;
  totalTime = 0;
  updateProgress();
  renderScenario();
}

function renderScenario() {
  clearInterval(timer);

  const content = document.getElementById("content");

  if (index >= scenarios.length) {
    content.innerHTML = `
      <h2>✅ Simulation Complete</h2>
      <p><strong>Score:</strong> ${score}/${scenarios.length}</p>
      <p><strong>Total Time:</strong> ${totalTime} seconds</p>
      <button class="primary" onclick="startSimulation()">Restart Simulation</button>
    `;
    document.getElementById("timer").innerText = "";
    document.getElementById("status").innerText = "";
    updateProgress(true);
    return;
  }

  const s = scenarios[index];
  content.innerHTML = `
    <div class="scenario">${s.q}</div>
    ${s.a.map((opt,i)=>`<button onclick="answer(${i})">${opt}</button>`).join("")}
  `;

  document.getElementById("status").innerText =
    `Scenario ${index + 1} of ${scenarios.length}`;

  updateProgress();
  startTimer();
}

function startTimer() {
  let timeLeft = 10;
  document.getElementById("timer").innerText =
    `⏳ Clearance window: ${timeLeft}s`;

  timer = setInterval(() => {
    timeLeft--;
    totalTime++;
    document.getElementById("timer").innerText =
      `⏳ Clearance window: ${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);
      index = 0;
      updateProgress();
      renderScenario();
    }
  }, 1000);
}

function answer(choice) {
  clearInterval(timer);
  if (choice === scenarios[index].c) score++;
  index++;
  updateProgress();
  renderScenario();
}

function updateProgress(forceComplete = false) {
  const progressFill = document.getElementById("progressFill");
  const progressLabel = document.getElementById("progressLabel");

  let percent = forceComplete
    ? 100
    : Math.round((index / scenarios.length) * 100);

  progressFill.style.width = percent + "%";
  progressLabel.innerText = `Progress: ${percent}%`;
}
</script>

</body>
</html>
