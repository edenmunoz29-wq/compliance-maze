<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AO25 Compliance Simulation</title>
<style>
body {
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e5e7eb;
  text-align: center;
  padding: 20px;
}
.game-container {
  max-width: 900px;
  margin: auto;
  background: #020617;
  padding: 36px;
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
h1 { color: #93c5fd; margin-bottom: 8px; }
.role-desc {
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 24px;
}
input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 65%;
  background: #0f172a;
  color: #e5e7eb;
}
.start-btn {
  padding: 14px 28px;
  border-radius: 14px;
  background: linear-gradient(90deg, #22c55e, #14b8a6);
  border: none;
  color: #020617;
  font-weight: 600;
  cursor: pointer;
  margin-top: 15px;
}
.scenario { font-size: 22px; font-weight: 600; margin: 28px 0; }
.options button {
  display: block;
  margin: 12px auto;
  padding: 16px 20px;
  width: 92%;
  border-radius: 14px;
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
  font-size: 17px;
  cursor: pointer;
}
.options button:hover { background: #334155; }
.feedback { margin: 18px 0; font-weight: 600; color: #fde68a; }
.timer { color: #f97316; margin: 10px 0; }
.progress-container {
  width: 100%; background: #1e293b; border-radius: 20px;
  margin: 18px 0; height: 18px;
}
.progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #22c55e, #14b8a6);
  transition: width 0.5s ease;
}
.status-line { font-size: 15px; color: #cbd5e1; }
.maze {
  display: grid; grid-template-columns: repeat(5, 46px);
  gap: 7px; justify-content: center; margin: 26px auto;
}
.cell { width: 46px; height: 46px; background: #1e293b; border-radius: 8px; }
.cell.start { background: #2563eb; }
.cell.active { background: #22c55e; }
.cell.exit { background: #f59e0b; }
.score { margin-top: 20px; font-size: 18px; white-space: pre-line; }
</style>
</head>
