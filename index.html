
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO25 Compliance Simulation</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111827;
  color: #e5e7eb;
  text-align: center;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
  background: #020617;
  padding: 30px;
  border-radius: 12px;
}
button {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #1d4ed8;
}
.timer {
  color: #f97316;
  margin: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🛡️ AO25 Compliance Simulation</h1>
  <p><strong>Role:</strong> AO25 Information Custodian</p>

  <button onclick="startSimulation()">Start Simulation</button>

  <div id="scenario"></div>
  <div class="timer" id="timer"></div>
  <div id="progress"></div>
</div>

<script>
const scenarios = [
  { q: "Update AO25 dashboard using uncleared email data?", a: ["Yes", "No"], c: 1 },
  { q: "Modify eligibility in the system?", a: ["Yes", "No"], c: 1 },
  { q: "Create scorecard template without approval?", a: ["Yes", "No"], c: 1 },
  { q: "Upload scorecard without clearance?", a: ["Yes", "No"], c: 1 },
  { q: "Encode compliance from verbal confirmation?", a: ["Yes", "No"], c: 1 },
  { q: "Grant unrestricted database access?", a: ["Yes", "No"], c: 1 },
  { q: "Modify data based on interpretation?", a: ["Yes", "No"], c: 1 },
  { q: "Is version control important?", a: ["Yes", "No"], c: 0 },
  { q: "Does dashboard management decide eligibility?", a: ["Yes", "No"], c: 1 },
  { q: "Is policy interpretation part of the function?", a: ["Yes", "No"], c: 1 }
];

let index = 0;
let score = 0;
let totalTime = 0;
let timer;

function startSimulation() {
  index = 0;
  score = 0;
  totalTime = 0;
  renderScenario();
}

function renderScenario() {
  clearInterval(timer);

  if (index >= scenarios.length) {
    document.getElementById("scenario").innerHTML =
      `<h2>✅ Simulation Complete</h2>
       <p>Score: ${score}/${scenarios.length}</p>
       <p>Total Time: ${totalTime} seconds</p>`;
    document.getElementById("timer").innerText = "";
    return;
  }

  let s = scenarios[index];
  document.getElementById("scenario").innerHTML =
    `<h3>${s.q}</h3>` +
    s.a.map((opt, i) =>
      `<button onclick="answer(${i})">${opt}</button>`
    ).join("");

  startTimer();
}

function startTimer() {
  let timeLeft = 10;
  document.getElementById("timer").innerText =
    `⏳ Clearance window: ${timeLeft}s`;

  timer = setInterval(() => {
    timeLeft--;
    totalTime++;
    document.getElementById("timer").innerText =
      `⏳ Clearance window: ${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);
      index = 0;
      renderScenario();
    }
  }, 1000);
}

function answer(choice) {
  clearInterval(timer);
  if (choice === scenarios[index].c) score++;
  index++;
  renderScenario();
}
</script>

</body>
</html>
